<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0D0D" />
    <title>Ingresar — ServiSalo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body class="page-gradient">
    <main class="auth">
      <a class="auth__back" href="index.html">← Inicio</a>

      <h1 class="brand brand--auth">
        <span class="brand-servi">Servi</span><span class="brand-salo">Salo</span>
      </h1>
      <p class="auth__subtitle">Inicia sesión en tu cuenta</p>

      <form class="auth__form" id="login-form" novalidate>
        <label class="field">
          <span class="field__label">Correo o usuario</span>
          <input class="field__input" type="text" name="user" autocomplete="username" required />
        </label>
        <label class="field">
          <span class="field__label">Contraseña</span>
          <input class="field__input" type="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn btn--primary btn--uppercase">INGRESAR</button>
      </form>

      <p class="auth__footer">
        ¿No tienes cuenta?
        <a href="register.html">Crear cuenta</a>
      </p>
      <p class="auth__note">Maqueta: cualquier credencial permite el acceso.</p>
    </main>

    <script type="module" src="js/login.js"></script>
  </body>
</html>
