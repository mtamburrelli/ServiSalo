<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0D0D" />
    <meta name="description" content="ServiSalo — catálogo de legumbres" />
    <title>Catálogo — ServiSalo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/catalog.css" />
  </head>
  <body class="page-app">
    <div class="app-shell">
      <div class="app" id="app">
        <header class="header">
          <h1 class="brand">
            <span class="brand-servi">Servi</span><span class="brand-salo">Salo</span>
          </h1>
          <button type="button" class="header__logout" id="btn-logout" title="Cerrar sesión">Salir</button>
        </header>

        <main class="main">
          <section class="panel panel--active" id="panel-catalog" aria-label="Catálogo de legumbres">
            <ul class="catalog" id="catalog-list" role="list"></ul>
          </section>

          <section class="panel" id="panel-cart" aria-label="Carrito de compras" hidden>
            <div class="cart-empty" id="cart-empty">
              <svg class="cart-empty__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.16 14l.84-2h8.45l1.2 3H7.16zM6.21 6l-1.1-2H1v2h2l3.6 7.59-1.35 2.44C5.09 16.37 5.5 17 6.21 17h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12L8.1 13h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 20 4H5.21L4.27 2H1V0h3.74c.67 0 1.27.42 1.5 1.05L6.21 6z"
                  fill="currentColor"
                />
              </svg>
              <p class="cart-empty__title">Tu carrito está vacío</p>
              <p class="cart-empty__hint">Explora el catálogo y agrega legumbres.</p>
            </div>

            <ul class="cart-lines" id="cart-lines" role="list" hidden></ul>

            <footer class="cart-checkout" id="cart-checkout" hidden>
              <div class="cart-total">
                <span>Total estimado</span>
                <strong id="cart-total">B/. 0.00</strong>
              </div>

              <p class="cart-checkout__label">Método de pago</p>
              <div class="payment-toggle" role="group" aria-label="Método de pago">
                <button type="button" class="payment-toggle__btn payment-toggle__btn--active" data-payment="ach">
                  ACH
                </button>
                <button type="button" class="payment-toggle__btn" data-payment="yappy">Yappy</button>
              </div>
              <p class="payment-hint" id="payment-hint">
                Transferencia bancaria local (ACH). Recibirás los datos al confirmar.
              </p>

              <button type="button" class="btn btn--primary" id="btn-checkout" disabled>
                Confirmar pedido
              </button>
              <p class="cart-checkout__note">Maqueta — el pago real se conectará después.</p>
            </footer>
          </section>
        </main>

        <nav class="bottom-nav" aria-label="Navegación principal">
          <button type="button" class="bottom-nav__item bottom-nav__item--active" data-tab="catalog" aria-current="page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6zm10 0h6v6h-6v-6z"
                fill="currentColor"
              />
            </svg>
            <span>Catálogo</span>
          </button>
          <button type="button" class="bottom-nav__item" data-tab="cart">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.16 14l.84-2h8.45l1.2 3H7.16zM6.21 6l-1.1-2H1v2h2l3.6 7.59-1.35 2.44C5.09 16.37 5.5 17 6.21 17h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12L8.1 13h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 20 4H5.21L4.27 2H1V0h3.74c.67 0 1.27.42 1.5 1.05L6.21 6z"
                fill="currentColor"
              />
            </svg>
            <span>Carrito</span>
            <span class="bottom-nav__badge" id="cart-badge" hidden>0</span>
          </button>
        </nav>

        <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
