<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0D0D" />
    <title>Ingresar — ServiSalo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
  </head>
  <body class="page-gradient">
    <main class="auth">
      <a class="auth__back" href="{{ url_for('home') }}">← Inicio</a>

      <h1 class="brand brand--auth">
        <span class="brand-servi">Servi</span><span class="brand-salo">Salo</span>
      </h1>
      <p class="auth__subtitle">Inicia sesión en tu cuenta</p>

      <form class="auth__form" id="login-form" novalidate>
        <label class="field">
          <span class="field__label">Correo electrónico</span>
          <input class="field__input" type="email" name="email" autocomplete="email" required />
        </label>
        <label class="field">
          <span class="field__label">Contraseña</span>
          <input class="field__input" type="password" name="password" autocomplete="current-password" required />
        </label>

        <p class="auth__error" id="login-error" hidden></p>

        <button type="submit" class="btn btn--primary btn--uppercase" id="login-submit">INGRESAR</button>
      </form>

      <p class="auth__footer">
        ¿No tienes cuenta?
        <a href="{{ url_for('register_page') }}">Crear cuenta</a>
      </p>
    </main>

    <script type="module" src="{{ url_for('static', filename='js/login.js') }}"></script>
  </body>
</html>
