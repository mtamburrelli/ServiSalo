<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0D0D" />
    <title>Crear cuenta — ServiSalo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>
  <body class="page-gradient">
    <main class="auth auth--register">
      <a class="auth__back" href="{{ url_for('home') }}">← Inicio</a>

      <h1 class="brand brand--auth">
        <span class="brand-servi">Servi</span><span class="brand-salo">Salo</span>
      </h1>
      <p class="auth__subtitle">Crea tu cuenta de cliente</p>

      <form class="auth__form" id="register-form" novalidate>
        <p class="auth__section">Datos de cuenta</p>

        <label class="field">
          <span class="field__label">Tipo de cuenta</span>
          <select class="field__input field__select" name="account_type" required>
            <option value="persona">Persona</option>
            <option value="empresa">Empresa</option>
          </select>
        </label>

        <label class="field">
          <span class="field__label">Nombre (persona o empresa)</span>
          <input class="field__input" type="text" name="name" autocomplete="name" required />
        </label>

        <label class="field">
          <span class="field__label">Correo electrónico</span>
          <input class="field__input" type="email" name="email" autocomplete="email" required />
        </label>

        <label class="field">
          <span class="field__label">Celular</span>
          <input class="field__input" type="tel" name="phone" autocomplete="tel" required />
        </label>

        <label class="field">
          <span class="field__label">Contraseña</span>
          <input class="field__input" type="password" name="password" autocomplete="new-password" minlength="6" required />
        </label>

        <label class="field">
          <span class="field__label">Confirmar contraseña</span>
          <input class="field__input" type="password" name="password_confirm" autocomplete="new-password" minlength="6" required />
        </label>

        <p class="auth__section">Ubicación de despacho — Ciudad de Panamá</p>

        <label class="field">
          <span class="field__label">Dirección</span>
          <input
            class="field__input"
            type="text"
            name="address_line"
            placeholder="Calle, edificio, apartamento, referencia…"
            required
          />
        </label>

        <label class="field">
          <span class="field__label">Corregimiento</span>
          <input
            class="field__input"
            type="text"
            name="corregimiento"
            placeholder="Ej. Bella Vista, El Cangrejo, San Francisco…"
            required
          />
        </label>

        <div class="field">
          <span class="field__label">Ubicación exacta en el mapa</span>
          <p class="map-hint">Mueve el pin al lugar exacto donde quieres recibir tu pedido.</p>
          <div id="map" class="map-container"></div>
          <p class="map-coords" id="map-coords">Pin no colocado aún</p>
        </div>

        <input type="hidden" name="latitude" id="input-latitude" />
        <input type="hidden" name="longitude" id="input-longitude" />

        <p class="auth__error" id="register-error" hidden></p>

        <button type="submit" class="btn btn--outline-gold btn--uppercase" id="register-submit">
          CREAR CUENTA
        </button>
      </form>

      <p class="auth__footer">
        ¿Ya tienes cuenta?
        <a href="{{ url_for('login_page') }}">Ingresar</a>
      </p>
    </main>

    <script type="module" src="{{ url_for('static', filename='js/register.js') }}"></script>
  </body>
</html>
